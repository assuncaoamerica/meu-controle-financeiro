<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FPS 3D com Arma</title>
<style>
body, html { margin:0; padding:0; overflow:hidden; background:#111; font-family:Arial;}
canvas { display:block; }
#menu, #gameOver, #victory {
    position:absolute; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center;
    flex-direction:column; z-index:10;
}
button { padding:15px 30px; margin:10px; font-size:20px; cursor:pointer; border:none; border-radius:5px; background:#2196F3; color:white; }
#hud { position:absolute; top:10px; left:10px; font-size:18px; z-index:5; }
#crosshair { position:absolute; top:50%; left:50%; width:20px; height:20px; margin-left:-10px; margin-top:-10px; z-index:5; }
#crosshair:before, #crosshair:after { content:''; position:absolute; background:white; }
#crosshair:before { left:50%; top:0; width:2px; height:100%; margin-left:-1px; }
#crosshair:after { top:50%; left:0; width:100%; height:2px; margin-top:-1px; }
</style>
</head>
<body>

<div id="menu">
    <h1>FPS 3D Arena</h1>
    <button id="startButton">Jogar</button>
</div>

<div id="gameOver" style="display:none;">
    <h1>Game Over</h1>
    <button id="restartButton">Reiniciar</button>
</div>

<div id="victory" style="display:none;">
    <h1>Você venceu!</h1>
    <button id="restartVictoryButton">Reiniciar</button>
</div>

<div id="hud">
Vida: <span id="health">100</span> | Munição: <span id="ammo">30</span> | Kills: <span id="kills">0</span>
</div>

<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
let scene, camera, renderer;
let controlsEnabled=false;
let moveForward=false, moveBackward=false, moveLeft=false, moveRight=false;
let canJump=false;
let velocity=new THREE.Vector3();
let direction=new THREE.Vector3();
let prevTime=performance.now();
let objects=[];
let enemies=[];
let player={health:100, ammo:30, kills:0};
let raycaster;
const ENEMY_COUNT=7;

// === ARMA E MÃOS ===
let weapon, leftHand, rightHand;
let shootRecoil=0;

init();

function init(){
    scene=new THREE.Scene();
    scene.background=new THREE.Color(0x0a0a0a);

    camera=new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1,1000);
    camera.position.y=1.6;

    renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Luzes
    const ambient=new THREE.AmbientLight(0x404040);
    scene.add(ambient);
    const dir=new THREE.DirectionalLight(0xffffff,0.8);
    dir.position.set(5,10,7.5);
    scene.add(dir);

    // Chão
    const floorGeo=new THREE.PlaneGeometry(50,50);
    const floorMat=new THREE.MeshPhongMaterial({color:0x222222});
    const floor=new THREE.Mesh(floorGeo,floorMat);
    floor.rotation.x=-Math.PI/2;
    scene.add(floor);
    objects.push(floor);

    // Paredes
    createWall(-25,2.5,0,1,5,50);
    createWall(25,2.5,0,1,5,50);
    createWall(0,2.5,-25,50,5,1);
    createWall(0,2.5,25,50,5,1);

    // Obstáculos
    createObstacle(0,1,0);
    createObstacle(-5,1,-5);
    createObstacle(5,1,5);
    createObstacle(-10,1,10);
    createObstacle(10,1,-10);

    // Inimigos
    for(let i=0;i<ENEMY_COUNT;i++) spawnEnemy();

    // Raycaster
    raycaster=new THREE.Raycaster();

    // Arma e mãos
    createWeapon();

    // Eventos
    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);
    document.addEventListener('mousedown', onMouseDown);
    window.addEventListener('resize', onWindowResize);

    // Pointer Lock
    document.getElementById('startButton').addEventListener('click',()=>document.body.requestPointerLock());
    document.addEventListener('pointerlockchange',()=>{
        controlsEnabled=(document.pointerLockElement===document.body);
        if(controlsEnabled) document.getElementById('menu').style.display='none';
    });

    // Restart
    document.getElementById('restartButton').addEventListener('click', resetGame);
    document.getElementById('restartVictoryButton').addEventListener('click', resetGame);

    document.addEventListener('mousemove', onMouseMove);

    animate();
}

// Criar paredes/obstáculos
function createWall(x,y,z,sx,sy,sz){
    const geo=new THREE.BoxGeometry(sx,sy,sz);
    const mat=new THREE.MeshPhongMaterial({color:0x4444aa});
    const wall=new THREE.Mesh(geo,mat);
    wall.position.set(x,y,z);
    scene.add(wall);
    objects.push(wall);
}
function createObstacle(x,y,z){
    const geo=new THREE.BoxGeometry(2,2,2);
    const mat=new THREE.MeshPhongMaterial({color:0xaa4444});
    const box=new THREE.Mesh(geo,mat);
    box.position.set(x,y,z);
    scene.add(box);
    objects.push(box);
}

// Criar inimigos
function spawnEnemy(){
    const geo=new THREE.BoxGeometry(1,2,1);
    const mat=new THREE.MeshPhongMaterial({color:0x00ff00});
    const enemy=new THREE.Mesh(geo,mat);
    enemy.position.set((Math.random()-0.5)*40,1,(Math.random()-0.5)*40);
    enemy.health=3;
    scene.add(enemy);
    enemies.push(enemy);
}

// Criar arma e mãos
function createWeapon(){
    weapon=new THREE.Group();

    // Corpo arma
    const gunGeo=new THREE.BoxGeometry(0.1,0.1,0.4);
    const gunMat=new THREE.MeshPhongMaterial({color:0x555555});
    const gun=new THREE.Mesh(gunGeo,gunMat);
    gun.position.set(0,0,0.2);
    weapon.add(gun);

    // Mãos simples
    const handGeo=new THREE.BoxGeometry(0.05,0.1,0.05);
    const handMat=new THREE.MeshPhongMaterial({color:0xffcc99});
    leftHand=new THREE.Mesh(handGeo,handMat);
    leftHand.position.set(-0.05,-0.05,0.1);
    weapon.add(leftHand);
    rightHand=new THREE.Mesh(handGeo,handMat);
    rightHand.position.set(0.05,-0.05,0.1);
    weapon.add(rightHand);

    camera.add(weapon);
    weapon.position.set(0,-0.1,-0.2);
}

// Eventos de movimento
function onKeyDown(e){
    switch(e.code){
        case 'KeyW': moveForward=true; break;
        case 'KeyS': moveBackward=true; break;
        case 'KeyA': moveLeft=true; break;
        case 'KeyD': moveRight=true; break;
        case 'Space': if(canJump){ velocity.y+=5; canJump=false; } break;
    }
}
function onKeyUp(e){
    switch(e.code){
        case 'KeyW': moveForward=false; break;
        case 'KeyS': moveBackward=false; break;
        case 'KeyA': moveLeft=false; break;
        case 'KeyD': moveRight=false; break;
    }
}

// Mouse look
function onMouseMove(e){
    if(!controlsEnabled) return;
    camera.rotation.y -= e.movementX*0.002;
    camera.rotation.x -= e.movementY*0.002;
    camera.rotation.x=Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
}

// Mouse shoot
document.addEventListener('mousedown', ()=>{
    if(player.ammo>0){
        shoot();
        player.ammo--;
        document.getElementById('ammo').textContent=player.ammo;
    }
});

// Função de tiro
function shoot(){
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects=raycaster.intersectObjects(enemies);
    if(intersects.length>0){
        const enemy=intersects[0].object;
        enemy.health--;
        if(enemy.health<=0){
            createBloodEffect(enemy.position);
            scene.remove(enemy);
            enemies.splice(enemies.indexOf(enemy),1);
            player.kills++;
            document.getElementById('kills').textContent=player.kills;
            if(enemies.length===0) victory();
        }
    }
    // Tiro sonoro
    const context=new AudioContext();
    const o=context.createOscillator();
    const g=context.createGain();
    o.type='square';
    o.frequency.setValueAtTime(600,context.currentTime);
    o.connect(g);
    g.connect(context.destination);
    o.start(); o.stop(context.currentTime+0.05);

    // Recoil
    shootRecoil=0.1;
}

// Efeito sangue
function createBloodEffect(pos){
    const geo=new THREE.SphereGeometry(0.2,4,4);
    const mat=new THREE.MeshBasicMaterial({color:0xff0000});
    const p=new THREE.Mesh(geo,mat);
    p.position.copy(pos);
    scene.add(p);
    setTimeout(()=>scene.remove(p),300);
}

// Animação
function animate(){
    requestAnimationFrame(animate);

    if(controlsEnabled){
        const time=performance.now();
        const delta=(time-prevTime)/1000;

        velocity.x-=velocity.x*10.0*delta;
        velocity.z-=velocity.z*10.0*delta;
        velocity.y-=9.8*5.0*delta;

        direction.z=Number(moveForward)-Number(moveBackward);
        direction.x=Number(moveRight)-Number(moveLeft);
        direction.normalize();

        let speed=5.0;
        if(event.shiftKey) speed=10.0;

        if(moveForward || moveBackward) velocity.z-=direction.z*speed*delta;
        if(moveLeft || moveRight) velocity.x-=direction.x*speed*delta;

        // Colisão simples
        let nextPos=camera.position.clone();
        nextPos.x+=velocity.x*delta;
        nextPos.y+=velocity.y*delta;
        nextPos.z+=velocity.z*delta;

        for(let obj of objects){
            const box=new THREE.Box3().setFromObject(obj);
            if(box.containsPoint(nextPos)){
                velocity.x=0; velocity.z=0;
            }
        }

        camera.position.addScaledVector(velocity, delta);

        if(camera.position.y<1.6){ velocity.y=0; camera.position.y=1.6; canJump=true; }

        prevTime=time;

        // Enemy AI
        enemies.forEach(enemy=>{
            let dir=new THREE.Vector3().subVectors(camera.position, enemy.position);
            dir.y=0; dir.normalize();
            enemy.position.addScaledVector(dir, 1*delta);
        });

        // Dano se muito próximo
        enemies.forEach(enemy=>{
            const dist=camera.position.distanceTo(enemy.position);
            if(dist<1.5){
                player.health-=10*delta;
                if(player.health<0) player.health=0;
                document.getElementById('health').textContent=Math.floor(player.health);
                if(player.health<=0) gameOver();
            }
        });

        // Recoil arma
        if(shootRecoil>0){
            weapon.position.z=-0.2+shootRecoil;
            shootRecoil-=delta*5;
            if(shootRecoil<0) shootRecoil=0;
        }else{
            weapon.position.z=-0.2;
        }
    }

    renderer.render(scene,camera);
}

function onWindowResize(){
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function gameOver(){
    controlsEnabled=false;
    document.exitPointerLock();
    document.getElementById('gameOver').style.display='flex';
}
function victory(){
    controlsEnabled=false;
    document.exitPointerLock();
    document.getElementById('victory').style.display='flex';
}
function resetGame(){ location.reload(); }
</script>
</body>
</html>
