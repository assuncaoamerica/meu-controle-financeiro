<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <button id="modo">🌙</button>
    <h1>Minha To-Do List</h1>

    <form id="form">
        <input type="text" id="tarefa" placeholder="Digite uma tarefa" required>
        <button  type="submit">Adicionar</button>
    </form>

    <div class="filtros">
        <button onclick="filtrar('todas')">Todas</button>
        <button onclick="filtrar('pendentes')">Pendentes</button>
        <button onclick="filtrar('concluidas')">Concluídas</button>
    </div>
  <p id="contador"></p>
    <ul id="lista"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
