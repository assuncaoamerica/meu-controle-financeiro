<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro</title>
    <link rel="stylesheet" href="css/finance/style.css">
</head>
<body>
    
    <button id="modo">🌙 Modo Escuro</button>

<div class="container">
    <h1>💰 Controle Financeiro</h1>

    <div class="saldo">
        <h2>Saldo: R$ <span id="saldo">0.00</span></h2>
    </div>

    <div class="resumo">
        <p>Entradas: R$ <span id="entradas">0.00</span></p>
        <p>Saídas: R$ <span id="saidas">0.00</span></p>
    </div>

    <canvas id="grafico"></canvas>

    <form id="form">
        <input type="text" id="descricao" placeholder="Descrição" required>
        <input type="number" id="valor" placeholder="Valor" required>

        <select id="tipo">
            <option value="entrada">Entrada</option>
            <option value="saida">Saída</option>
        </select>

        <button type="submit">Adicionar</button>
    </form>

    <select id="filtro">
        <option value="todos">Todos</option>
        <option value="entrada">Entradas</option>
        <option value="saida">Saídas</option>
    </select>
    
    <ul id="lista"></ul>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="css/finance/script.js"></script>

</body>
</html>
